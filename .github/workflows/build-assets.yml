name: Build and commit frontend assets

on:
  push:
    branches: [main]
    paths:
      - 'resources/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'tailwind.config.js'

jobs:
  build:
    runs-on: ubuntu-latest

    # Не запускать если коммит сделан самим workflow (чтобы не зациклиться)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Commit and push built assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'build: update frontend assets [skip ci]'
          file_pattern: 'public/build/**'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
